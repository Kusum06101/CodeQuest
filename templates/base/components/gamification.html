<!-- Gamification Elements -->
<div class="gamification-elements">
    <!-- XP Popup (dynamic) -->
    <div class="xp-popup" style="display: none;"></div>
    
    <!-- Level Up Animation -->
    <div class="level-up-animation" style="display: none;">
        <div class="level-up-content">
            <span class="level-up-icon">🎉</span>
            <h2>LEVEL UP!</h2>
            <p>Congratulations! You've reached a new level!</p>
        </div>
    </div>
    
    <!-- Confetti Container -->
    <div class="confetti-container"></div>
    
    <!-- Achievement Toast -->
    <div class="achievement-toast" style="display: none;">
        <div class="achievement-icon">🏆</div>
        <div class="achievement-text">
            <strong>Achievement Unlocked!</strong>
            <span class="achievement-name"></span>
        </div>
    </div>
</div>

<script>
// Gamification functions
function showXPPopup(element, xpAmount) {
    const popup = document.createElement('div');
    popup.className = 'xp-popup';
    popup.textContent = `+${xpAmount} XP`;
    const rect = element.getBoundingClientRect();
    popup.style.left = rect.left + rect.width/2 + 'px';
    popup.style.top = rect.top + 'px';
    document.body.appendChild(popup);
    setTimeout(() => popup.remove(), 1000);
}

function showLevelUp(level) {
    const levelUp = document.querySelector('.level-up-animation');
    if (levelUp) {
        levelUp.querySelector('h2').innerHTML = `LEVEL ${level} REACHED!`;
        levelUp.style.display = 'flex';
        setTimeout(() => {
            levelUp.style.display = 'none';
        }, 3000);
    }
}

function showAchievement(badgeName) {
    const toast = document.querySelector('.achievement-toast');
    if (toast) {
        toast.querySelector('.achievement-name').textContent = badgeName;
        toast.style.display = 'flex';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 4000);
    }
}
</script>
